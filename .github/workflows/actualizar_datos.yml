# Actualiza los JSONs del tablero automáticamente cuando se sube
# un nuevo archivo Excel a cualquier carpeta dim*/fuentes/
name: Actualizar datos

on:
  push:
    paths:
      - 'dim*/fuentes/**'

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl

      # Ejecuta el script de cada dimensión que tenga uno
      - name: Ejecutar scripts de actualización
        run: |
          for script in dim*/actualizar.py; do
            if [ -f "$script" ]; then
              echo ">>> Ejecutando $script"
              python "$script"
            fi
          done

      - name: Verificar si hay cambios
        id: check
        run: |
          git diff --quiet dim*/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit y push datos actualizados
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dim*/data/
          git commit -m "Actualizar datos del tablero (automático)"
          git push
